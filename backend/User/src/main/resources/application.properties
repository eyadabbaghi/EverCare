spring.application.name=User-service

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/EverCaredb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jmx.enabled=false

# Server
server.port=8096
server.servlet.context-path=/EverCare

# Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Google Client ID (optional ? you may still need it if you re-implement Google login)
google.client-id=122324853691-34s6l0e9bho0a65vlj82pf6o63u6b8vg.apps.googleusercontent.com

# Keycloak OIDC ? for token validation
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/EverCareRealm

# Keycloak Admin API client ? for registration / password change
keycloak.auth-server-url=http://localhost:8080
keycloak.realm=EverCareRealm
keycloak.client-id=admin-cli
keycloak.client-secret=gHCigywHerjZ9wshVmNDSWPk6WexLiDV

