spring.application.name=ApiGateway
server.port=8089

# Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Enable automatic routing via Eureka
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# CORS for Angular
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

# Route for DailyMe microservice
spring.cloud.gateway.routes[0].id=dailyme
spring.cloud.gateway.routes[0].uri=lb://DAILYME-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/dailyme/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1